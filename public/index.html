<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MustardSeed Productions</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <style>
    /* ── RESET ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Georgia', 'Palatino Linotype', serif;
    }

    /* ── STAGE ── */
    #stage {
      position: fixed;
      inset: 0;
      background: #000;
    }

    /* ── VIDEO ── */
    #hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      /* Video fades out over 1.4s — long enough to overlap the canvas dissolve */
      transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── FINAL-FRAME CANVAS ── */
    #final-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      /* Canvas fades IN over 1.2s with a smooth ease — the core dissolve curve */
      transition: opacity 1.2s cubic-bezier(0.25, 0, 0.4, 1);
      pointer-events: none;
    }
    #final-canvas.visible { opacity: 1; }

    /* ── VIGNETTE ── */
    #vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 35%, rgba(0,0,0,0.55) 100%);
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
      z-index: 2;
    }
    #vignette.visible { opacity: 1; }

    /* ── LEAVES ── */
    #leaves-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 2.5s ease;
    }
    #leaves-canvas.visible { opacity: 1; }

    /* ── DUST PARTICLES ── */
    #particles-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      transition: opacity 3.5s ease;
    }
    #particles-canvas.visible { opacity: 1; }

    /* ── TEXT OVERLAY CONTAINER ── */
    #text-block {
      position: absolute;
      /* Sit below the baked-in tagline in the final video frame.
         The video logo+tagline occupies roughly the vertical centre;
         we place our overlay in the lower third, well clear of it. */
      bottom: 7%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;                 /* gap managed by margin-top on child */
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #text-block.visible { opacity: 1; }
    #text-block.pulse   { animation: blockPulse 7.5s ease-in-out infinite; }

    /* Thin gold rule — visual separator */
    #text-divider {
      width: clamp(40px, 8vw, 72px);
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(212,175,55,0.55) 30%,
        rgba(212,175,55,0.55) 70%,
        transparent
      );
      margin-bottom: 14px;
    }

    /* Secondary line — the new planting-seeds message */
    #message {
      color: rgba(212, 175, 55, 0.78);   /* muted gold — 78% opacity */
      font-size: clamp(0.6rem, 1.3vw, 0.88rem);  /* noticeably smaller than tagline */
      letter-spacing: 0.22em;
      text-align: center;
      white-space: nowrap;
      max-width: 88vw;
      font-style: italic;
      font-weight: 400;
      text-shadow:
        0 0 8px  rgba(212,175,55,0.55),
        0 0 20px rgba(212,175,55,0.22);
      /* Own fade-in: delayed 0.8s after parent becomes visible */
      opacity: 0;
      animation: none;
      transition: opacity 0s;   /* controlled by JS, not CSS transition */
    }
    /* The secondary line fades in on its own keyframe after a delay */
    #message.grow-in {
      animation: seedGrow 1.8s ease forwards;
    }
    @keyframes seedGrow {
      0%   { opacity: 0;    transform: translateY(6px); }
      100% { opacity: 0.78; transform: translateY(0);   }
    }

    @keyframes blockPulse {
      0%,100% {
        opacity: 1;
        filter: brightness(1);
      }
      50% {
        opacity: 0.92;
        filter: brightness(1.15);
      }
    }

    /* ── VIG FOOTER LOCKUP ── */
    #vig-footer {
      position: fixed;
      /* Shifted lower — sits at a comfortable 10px from viewport bottom,
         well clear of other content but still anchored to the page foot */
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      /* Row layout: logo left, label right, all on one line */
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      z-index: 15;
      pointer-events: none;          /* container non-interactive */
      opacity: 0;
      /* Cinematic fade-in: 2.4s, delayed start via ease-in curve */
      transition: opacity 2.4s cubic-bezier(0.4, 0, 0.6, 1);
      white-space: nowrap;
    }
    #vig-footer.visible { opacity: 1; }

    /* Clickable logo link — no decoration */
    #vig-link {
      display: flex;
      align-items: center;
      pointer-events: all;
      cursor: pointer;
      outline: none;
      text-decoration: none;
      line-height: 0;               /* kills inline-block gap */
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      transition: filter 0.25s ease;
    }
    #vig-link:hover {
      filter: brightness(1.18) saturate(1.1);
    }

    /* The logo image itself */
    #vig-logo {
      width: clamp(36px, 4.5vw, 56px);
      height: auto;
      display: block;
      background: transparent;
      border: none;
      outline: none;
      box-shadow: none;
      /* mix-blend-mode ensures any residual near-white edge
         disappears into a dark background */
      mix-blend-mode: screen;
      filter: brightness(0.95) saturate(1.05);
    }

    /* "A VIG Company" label */
    #vig-label {
      color: rgba(212, 175, 55, 0.50);
      font-size: clamp(0.5rem, 0.85vw, 0.65rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-family: 'Georgia', 'Palatino Linotype', serif;
      font-style: normal;
      font-weight: 400;
      pointer-events: none;
      line-height: 1;
    }

    /* ── SOUND TOGGLE ── */
    #sound-btn {
      position: fixed;
      bottom: 26px;
      right: 26px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1.5px solid rgba(212,175,55,0.4);
      background: rgba(8,12,18,0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #d4af37;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      outline: none;
      transition: border-color 0.3s, background 0.3s, transform 0.2s, box-shadow 0.3s;
    }
    #sound-btn:hover {
      border-color: rgba(212,175,55,0.85);
      background: rgba(18,22,30,0.94);
      transform: scale(1.1);
      box-shadow: 0 0 14px rgba(212,175,55,0.3);
    }
    #sound-btn svg { width: 19px; height: 19px; fill: #d4af37; }

    /* ── LOADING INDICATOR ── */
    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: #000;
      transition: opacity 0.8s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(212,175,55,0.15);
      border-top-color: rgba(212,175,55,0.85);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p {
      color: rgba(212,175,55,0.6);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-style: italic;
    }
  </style>
</head>
<body>

<div id="stage">

  <!-- Loading screen while video buffers -->
  <div id="loader">
    <div class="loader-ring"></div>
    <p>Loading&hellip;</p>
  </div>

  <video id="hero-video"
    autoplay
    muted
    playsinline
    preload="auto"
    disablePictureInPicture
    webkit-playsinline
    crossorigin="anonymous"
  >
    <!--
      PRIMARY SOURCE: Cloudflare R2 — production CDN asset
      Bucket: mustardseed-assets  |  Public URL enabled
    -->
    <source
      src="https://pub-00891786ee42488cb8a715a9bc019602.r2.dev/mustardseed-motion.mp4"
      type="video/mp4"
    />
  </video>

  <canvas id="final-canvas"></canvas>
  <div id="vignette"></div>
  <canvas id="leaves-canvas"></canvas>
  <canvas id="particles-canvas"></canvas>

  <!-- Text overlay — appears after video freezes on final frame -->
  <div id="text-block">
    <!-- Gold hairline separator -->
    <div id="text-divider"></div>
    <!-- Secondary line: planting seeds message -->
    <div id="message">We are currently planting seeds&hellip; thank you for your patience.</div>
  </div>

  <!-- VIG Footer Lockup: logo + label on one horizontal row, centered at bottom -->
  <div id="vig-footer">
    <a id="vig-link"
       href="https://www.vigholdings.com"
       target="_blank"
       rel="noopener noreferrer"
       aria-label="VIG Holdings — opens in new tab"
    >
      <img
        id="vig-logo"
        src="/static/vig-logo-transparent.png"
        alt="VIG"
        draggable="false"
      />
    </a>
    <span id="vig-label">A VIG Company</span>
  </div>

</div>

<!-- Sound Toggle -->
<button id="sound-btn" aria-label="Toggle sound">
  <svg id="icon-muted" viewBox="0 0 24 24">
    <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19L19 20.27 20.27 19l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>
  </svg>
  <svg id="icon-unmuted" viewBox="0 0 24 24" style="display:none">
    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/>
  </svg>
</button>

<script>
(function () {
  "use strict";

  /* ─── DOM ─── */
  const video        = document.getElementById('hero-video');
  const finalCanvas  = document.getElementById('final-canvas');
  const vignette     = document.getElementById('vignette');
  const leavesCanvas = document.getElementById('leaves-canvas');
  const particlesC   = document.getElementById('particles-canvas');
  const textBlock    = document.getElementById('text-block');
  const message      = document.getElementById('message');
  const vigFooter    = document.getElementById('vig-footer');
  const soundBtn     = document.getElementById('sound-btn');
  const iconMuted    = document.getElementById('icon-muted');
  const iconUnmuted  = document.getElementById('icon-unmuted');
  const loader       = document.getElementById('loader');

  const ctx  = finalCanvas.getContext('2d');
  const lCtx = leavesCanvas.getContext('2d');
  const pCtx = particlesC.getContext('2d');

  let frozen        = false;
  let leavesStarted = false;

  /* ══════════════════════════════════════════════════════════════════════
     AMBIENT SOUND ENGINE
     Pure Web Audio API — no audio files, zero HTTP requests.
     Three synthesised layers:
       A  Wind Bed      — bandpass-filtered noise, breathing LFO, stereo drift
       B  Leaf Rustles  — high-pass burst envelopes at random 3–7 s intervals
       C  Air Texture   — near-inaudible sub-bass sine (~42 Hz) for depth
     All controlled by a single master GainNode so the existing toggle
     ramps everything up / down atomically.
  ══════════════════════════════════════════════════════════════════════ */
  let ambCtx        = null;   // AudioContext (created lazily on first user gesture)
  let masterGain    = null;   // master volume bus
  let ambientReady  = false;  // true once nodes are wired up
  let ambientActive = false;  // true while the ambient layer is playing
  let gustTimer     = null;   // handle for next gust setTimeout
  let rustleTimer   = null;   // handle for next rustle setTimeout
  const MASTER_VOL  = 0.38;   // overall ceiling — deliberately quiet

  /* ── helpers ─────────────────────────────────────────────────────── */

  /** Fill an AudioBuffer with white noise (mono). */
  function makeNoiseBuffer(ac, seconds) {
    const len = ac.sampleRate * seconds;
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  }

  /** Ramp a GainNode from its current value to `target` over `ms` ms. */
  function rampGain(gainNode, target, ms) {
    const ac  = gainNode.context;
    const now = ac.currentTime;
    gainNode.gain.cancelScheduledValues(now);
    gainNode.gain.setValueAtTime(gainNode.gain.value, now);
    gainNode.gain.linearRampToValueAtTime(target, now + ms / 1000);
  }

  /* ── Layer A: Wind Bed ───────────────────────────────────────────── */
  /*
   * Architecture:
   *   noiseSource (looping buffer)
   *     → windBP  (BiquadFilter bandpass ~320 Hz, Q 0.6)  — body of wind
   *     → windHP  (BiquadFilter highpass ~80 Hz)           — remove sub rumble
   *     → windGain (GainNode 0.18)
   *       → LFO amplitude modulation (tremolo 0.04–0.10 Hz)
   *         → stereo panner (slow L/R drift)
   *           → masterGain
   */
  let windSource = null;
  let windGain   = null;
  let lfoGain    = null;
  let panner     = null;

  function buildWindBed(ac) {
    const noiseBuf = makeNoiseBuffer(ac, 4);   // 4 s loop

    windSource = ac.createBufferSource();
    windSource.buffer = noiseBuf;
    windSource.loop   = true;

    // Body bandpass — centre ~320 Hz gives a soft "airy" character
    const bp = ac.createBiquadFilter();
    bp.type      = 'bandpass';
    bp.frequency.value = 320;
    bp.Q.value   = 0.55;

    // HP to kill very low rumble
    const hp = ac.createBiquadFilter();
    hp.type      = 'highpass';
    hp.frequency.value = 90;
    hp.Q.value   = 0.5;

    windGain = ac.createGain();
    windGain.gain.value = 0.18;

    // LFO for slow breathing (0.06 Hz → one breath every ~16 s)
    const lfo = ac.createOscillator();
    lfo.type      = 'sine';
    lfo.frequency.value = 0.06;

    lfoGain = ac.createGain();
    lfoGain.gain.value = 0.065;   // depth of the tremolo

    // Stereo panner — will be animated in JS
    panner = ac.createStereoPanner ? ac.createStereoPanner() : ac.createPanner();
    if (panner.pan) panner.pan.value = 0;

    // Wire: noise → bp → hp → windGain → panner → master
    windSource.connect(bp);
    bp.connect(hp);
    hp.connect(windGain);
    windGain.connect(panner);
    panner.connect(masterGain);

    // LFO modulates windGain
    lfo.connect(lfoGain);
    lfoGain.connect(windGain.gain);
    lfo.start();
    windSource.start();
  }

  /* ── Gust events (Layer A enhancement) ──────────────────────────── */
  /*
   * Each gust: briefly bandpass a second noise burst at a slightly higher
   * centre frequency and fade it in/out with a short envelope.
   * Interval: random 6–10 s.
   */
  function fireGust(ac) {
    if (!ambientActive) return;

    const buf    = makeNoiseBuffer(ac, 2.5);
    const src    = ac.createBufferSource();
    src.buffer   = buf;

    // Gust BP slightly higher than wind bed (~550 Hz) for presence
    const bp = ac.createBiquadFilter();
    bp.type  = 'bandpass';
    bp.frequency.value = 550 + Math.random() * 200;
    bp.Q.value = 0.7;

    // Slight stereo position (randomise per gust)
    const pan = ac.createStereoPanner ? ac.createStereoPanner() : null;

    const env = ac.createGain();
    env.gain.value = 0;

    src.connect(bp);
    bp.connect(env);
    if (pan) { pan.pan.value = (Math.random() - 0.5) * 0.5; env.connect(pan); pan.connect(masterGain); }
    else     { env.connect(masterGain); }

    const now  = ac.currentTime;
    const peak = 0.10 + Math.random() * 0.08;   // quiet gust
    const dur  = 1.6 + Math.random() * 0.8;     // 1.6–2.4 s total

    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(peak, now + dur * 0.35);   // attack
    env.gain.linearRampToValueAtTime(0,    now + dur);           // release

    src.start(now);
    src.stop(now + dur + 0.05);

    // Schedule next gust
    const nextMs = 6000 + Math.random() * 4000;   // 6–10 s
    gustTimer = setTimeout(() => fireGust(ac), nextMs);
  }

  /* ── Layer B: Leaf Rustles ───────────────────────────────────────── */
  /*
   * Each rustle: very short (0.35–0.65 s) burst of high-pass noise with
   * a fast attack (20 ms) and smooth exponential release.
   * Interval: random 3–7 s.
   */
  function fireRustle(ac) {
    if (!ambientActive) return;

    const dur = 0.35 + Math.random() * 0.3;   // 0.35–0.65 s
    const buf = makeNoiseBuffer(ac, dur + 0.1);
    const src = ac.createBufferSource();
    src.buffer = buf;

    // High-pass at 1.8–3.5 kHz — papery rustling character
    const hp = ac.createBiquadFilter();
    hp.type  = 'highpass';
    hp.frequency.value = 1800 + Math.random() * 1700;
    hp.Q.value = 0.4;

    // Narrow bandpass on top to avoid harshness
    const bp2 = ac.createBiquadFilter();
    bp2.type  = 'bandpass';
    bp2.frequency.value = 3000 + Math.random() * 1500;
    bp2.Q.value = 1.2;

    // Slight detune per rustle for organic feel
    const pan = ac.createStereoPanner ? ac.createStereoPanner() : null;

    const env = ac.createGain();
    env.gain.value = 0;

    src.connect(hp);
    hp.connect(bp2);
    bp2.connect(env);
    if (pan) { pan.pan.value = (Math.random() - 0.5) * 0.8; env.connect(pan); pan.connect(masterGain); }
    else     { env.connect(masterGain); }

    const now  = ac.currentTime;
    const peak = 0.05 + Math.random() * 0.04;   // very quiet

    env.gain.setValueAtTime(0,    now);
    env.gain.linearRampToValueAtTime(peak, now + 0.02);    // 20 ms attack
    env.gain.exponentialRampToValueAtTime(0.0001, now + dur); // smooth release

    src.start(now);
    src.stop(now + dur + 0.05);

    // Schedule next rustle
    const nextMs = 3000 + Math.random() * 4000;   // 3–7 s
    rustleTimer = setTimeout(() => fireRustle(ac), nextMs);
  }

  /* ── Layer C: Air Texture (sub-bass presence) ────────────────────── */
  /*
   * A sine wave at ~42 Hz at barely-perceptible gain (0.022).
   * Felt more than heard — adds fullness to the silence.
   */
  let airOsc  = null;
  let airGain = null;

  function buildAirTexture(ac) {
    airOsc  = ac.createOscillator();
    airGain = ac.createGain();

    airOsc.type            = 'sine';
    airOsc.frequency.value = 42;
    airGain.gain.value     = 0.022;

    airOsc.connect(airGain);
    airGain.connect(masterGain);
    airOsc.start();
  }

  /* ── Slow stereo panner animation ────────────────────────────────── */
  /*
   * Smoothly drifts the wind bed L → R → L on a ~18 s cycle.
   * Uses setTargetAtTime so it's handled entirely by the audio thread.
   */
  let panPhase = 0;
  function tickPanner() {
    if (!ambientActive || !panner || !panner.pan) return;
    const ac  = ambCtx;
    panPhase += 0.0035;                      // ~18 s full cycle
    const pos  = Math.sin(panPhase) * 0.4;  // ±0.4 pan range
    panner.pan.setTargetAtTime(pos, ac.currentTime, 1.5);
    setTimeout(tickPanner, 300);             // update every 300 ms
  }

  /* ── Build and start the full ambient engine ─────────────────────── */
  function buildAmbient() {
    if (ambientReady) return;
    ambientReady = true;

    ambCtx     = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ambCtx.createGain();
    masterGain.gain.value = 0;   // silent until faded in
    masterGain.connect(ambCtx.destination);

    buildWindBed(ambCtx);
    buildAirTexture(ambCtx);
  }

  /* ── Fade the ambient layer IN ────────────────────────────────────── */
  function ambientFadeIn(delayMs) {
    if (!ambientReady || ambientActive) return;
    ambientActive = true;

    setTimeout(() => {
      if (!ambientActive) return;
      // Resume context if browser suspended it
      if (ambCtx.state === 'suspended') ambCtx.resume();
      // Fade master to MASTER_VOL over 2.5 s
      rampGain(masterGain, MASTER_VOL, 2500);
      // Start event layers after fade-in completes
      setTimeout(() => {
        if (!ambientActive) return;
        const firstGustDelay   = 1200 + Math.random() * 2000;
        const firstRustleDelay = 800  + Math.random() * 1500;
        gustTimer   = setTimeout(() => fireGust(ambCtx),   firstGustDelay);
        rustleTimer = setTimeout(() => fireRustle(ambCtx), firstRustleDelay);
        tickPanner();
      }, 2600);
    }, delayMs);
  }

  /* ── Fade the ambient layer OUT ───────────────────────────────────── */
  function ambientFadeOut(durationMs) {
    if (!ambientReady || !ambientActive) return;
    ambientActive = false;
    clearTimeout(gustTimer);
    clearTimeout(rustleTimer);
    rampGain(masterGain, 0, durationMs);
  }

  /* ── Resume audio context after user interaction (iOS/Safari fix) ── */
  function resumeAmbientCtx() {
    if (ambCtx && ambCtx.state === 'suspended') ambCtx.resume();
  }
  document.addEventListener('click',     resumeAmbientCtx, { passive: true });
  document.addEventListener('touchstart', resumeAmbientCtx, { passive: true });

  /* ─── CANVAS RESIZE ─── */
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    finalCanvas.width  = leavesCanvas.width  = particlesC.width  = w;
    finalCanvas.height = leavesCanvas.height = particlesC.height = h;
  }
  resize();
  window.addEventListener('resize', () => {
    resize();
    if (frozen) {
      try { ctx.drawImage(video, 0, 0, finalCanvas.width, finalCanvas.height); } catch(e){}
    }
  });

  /* ─── LOADER: hide once video can play ─── */
  function hideLoader() {
    loader.classList.add('hidden');
    setTimeout(() => { loader.style.display = 'none'; }, 900);
  }
  video.addEventListener('canplaythrough', hideLoader, { once: true });
  video.addEventListener('playing', hideLoader, { once: true });
  // Fallback: hide after 3s regardless
  setTimeout(hideLoader, 3000);

  /* ─── FREEZE FINAL FRAME ─── */
  function freezeFrame() {
    if (frozen) return;
    frozen = true;

    // ── Step 1: Paint the final frame onto the canvas immediately ──────────
    // We do this BEFORE any class changes so the pixel data is ready.
    resize();
    try { ctx.drawImage(video, 0, 0, finalCanvas.width, finalCanvas.height); } catch(e) {}

    // ── Step 2: Hold the final video frame for 250ms ──────────────────────
    // This brief pause lets the viewer's eye settle on the last frame
    // before the dissolve begins — prevents the abrupt-switch feeling.
    setTimeout(() => {

      // ── Step 3: Guarantee browser sees opacity:0 before .visible ─────────
      // Force a layout reflow so the CSS transition engine registers the
      // initial state.  Without this the browser may batch the paint and
      // the class-add into one frame, skipping the transition entirely.
      void finalCanvas.offsetHeight;  // trigger reflow

      // ── Step 4: Two-rAF trick — add .visible on the NEXT paint cycle ─────
      // requestAnimationFrame fires just before paint; the second rAF
      // fires on the frame after that, giving the browser one full frame
      // to record the start state before animating to opacity:1.
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {

          // Canvas dissolves IN (1.2s cubic-bezier)
          finalCanvas.classList.add('visible');

          // Video fades OUT 300ms after canvas starts — they overlap
          // cleanly for a true crossfade rather than a sequential swap.
          setTimeout(() => {
            video.pause();
            video.style.opacity = '0';
          }, 300);

          // Vignette deepens gently, 500ms into the dissolve
          setTimeout(() => vignette.classList.add('visible'), 500);

          // Leaves + particles begin 1.1s in — atmosphere builds after frame settles
          setTimeout(() => {
            leavesCanvas.classList.add('visible');
            particlesC.classList.add('visible');
            startLeaves();
            startParticles();

            // ── Ambient sound: build engine now (lazily, after first gesture)
            // We build immediately but only fade in if the user has unmuted.
            // If still muted, the engine stays silent and will start the moment
            // the user flips the toggle (checked in soundBtn click handler).
            buildAmbient();
            if (!muted) {
              // User had already enabled sound → start ambient after 1.5 s
              ambientFadeIn(1500);
            }
          }, 1100);

          // Text block: fades in at 2.0s; secondary line 0.8s after that
          setTimeout(() => {
            textBlock.classList.add('visible');
            setTimeout(() => message.classList.add('grow-in'), 800);
            // Pulse starts 2s after text appears
            setTimeout(() => textBlock.classList.add('pulse'), 2000);
          }, 2000);

          // VIG footer: the final quiet stamp — 3.6s after the dissolve began
          // (= 250ms hold + 3.6s = ~3.85s total from video end)
          setTimeout(() => vigFooter.classList.add('visible'), 3600);

        }); // rAF 2
      }); // rAF 1

    }, 250); // hold the final frame for 250ms before dissolve
  }

  video.addEventListener('ended', freezeFrame);
  video.addEventListener('timeupdate', () => {
    if (video.duration && video.currentTime >= video.duration - 0.15) freezeFrame();
  });

  /* Autoplay fallback */
  video.play().catch(() => {
    ['click','touchstart','keydown'].forEach(e =>
      document.addEventListener(e, () => video.play(), { once: true })
    );
  });

  /* ══════════════════════════════════════
     GOLDEN LEAVES
  ══════════════════════════════════════ */
  const LEAF_N = 22;
  const leaves = [];

  function drawLeaf(c, sz, shimmer) {
    const g = c.createRadialGradient(0, -sz*0.25, sz*0.04, 0, 0, sz*1.1);
    g.addColorStop(0,    'rgba(255,232,110,0.95)');
    g.addColorStop(0.35, 'rgba(212,175, 55,0.88)');
    g.addColorStop(0.75, 'rgba(180,140, 28,0.78)');
    g.addColorStop(1,    'rgba(130, 95, 15,0.55)');

    c.beginPath();
    c.moveTo(0, -sz);
    c.bezierCurveTo( sz*0.65,-sz*0.45,  sz*0.72, sz*0.28, 0,  sz);
    c.bezierCurveTo(-sz*0.72, sz*0.28, -sz*0.65,-sz*0.45, 0, -sz);
    c.closePath();
    c.fillStyle = g;
    c.fill();

    // midrib
    c.beginPath();
    c.moveTo(0, -sz*0.82);
    c.quadraticCurveTo(sz*0.07, 0, 0, sz*0.82);
    c.strokeStyle = 'rgba(255,210,70,0.35)';
    c.lineWidth = Math.max(0.5, sz*0.055);
    c.stroke();

    if (shimmer) {
      c.beginPath();
      c.moveTo(sz*0.05, -sz*0.55);
      c.bezierCurveTo(sz*0.38,-sz*0.18, sz*0.32,sz*0.12, sz*0.05, sz*0.45);
      c.strokeStyle = 'rgba(255,248,190,0.5)';
      c.lineWidth = Math.max(0.4, sz*0.04);
      c.stroke();
    }
  }

  function mkLeaf(stagger) {
    const W = leavesCanvas.width, H = leavesCanvas.height;
    return {
      x:  Math.random() * W * 1.3 - W * 0.15,
      y:  stagger ? -Math.random() * H * 1.4 : -(20 + Math.random()*80),
      sz: 6 + Math.random()*10,
      vx: (Math.random()-0.5)*0.5,
      vy: 0.45 + Math.random()*0.85,
      rot:  Math.random()*Math.PI*2,
      rotV: (Math.random()-0.5)*0.022,
      wob:  Math.random()*Math.PI*2,
      wobS: 0.009 + Math.random()*0.013,
      wobA: 0.35 + Math.random()*0.6,
      shi:  Math.random() > 0.45,
      alp:  0.50 + Math.random()*0.42,
      gPh:  Math.random()*Math.PI*2,
      gSpd: 0.018 + Math.random()*0.022,
    };
  }

  function tickLeaves() {
    const W = leavesCanvas.width, H = leavesCanvas.height;
    lCtx.clearRect(0,0,W,H);
    leaves.forEach(l => {
      l.wob += l.wobS;
      l.rot += l.rotV;
      l.x   += l.vx + Math.sin(l.wob)*l.wobA;
      l.y   += l.vy;
      l.gPh += l.gSpd;
      if (l.y > H+30) Object.assign(l, mkLeaf(false));
      const a = l.shi ? l.alp*(0.72+0.28*Math.sin(l.gPh)) : l.alp;
      lCtx.save();
      lCtx.translate(l.x, l.y);
      lCtx.rotate(l.rot);
      lCtx.globalAlpha = a;
      if (l.shi && Math.sin(l.gPh)>0.3) {
        lCtx.shadowColor='rgba(255,210,60,0.65)';
        lCtx.shadowBlur = l.sz*1.6;
      }
      drawLeaf(lCtx, l.sz, l.shi);
      lCtx.shadowBlur=0;
      lCtx.restore();
    });
    requestAnimationFrame(tickLeaves);
  }

  function startLeaves() {
    if (leavesStarted) return;
    leavesStarted = true;
    for (let i=0; i<LEAF_N; i++) leaves.push(mkLeaf(true));
    tickLeaves();
  }

  /* ══════════════════════════════════════
     AMBIENT DUST PARTICLES
  ══════════════════════════════════════ */
  const DUST_N = 40;
  const dust   = [];

  function mkDust() {
    return {
      x: Math.random()*particlesC.width,
      y: Math.random()*particlesC.height,
      r: 0.7 + Math.random()*1.8,
      vx:(Math.random()-0.5)*0.18,
      vy:-(0.07+Math.random()*0.15),
      a: 0.07+Math.random()*0.2,
      life:0, max:220+Math.random()*280,
    };
  }

  function tickDust() {
    const W=particlesC.width, H=particlesC.height;
    pCtx.clearRect(0,0,W,H);
    dust.forEach(p => {
      p.life++; p.x+=p.vx; p.y+=p.vy;
      if (p.life>p.max||p.y<-4||p.x<-4||p.x>W+4) {
        Object.assign(p,mkDust()); p.life=0; return;
      }
      const t=p.life/p.max;
      const f=t<0.15?t/0.15:t>0.78?(1-t)/0.22:1;
      pCtx.beginPath();
      pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
      pCtx.fillStyle=`rgba(212,175,55,${p.a*f})`;
      pCtx.fill();
    });
    requestAnimationFrame(tickDust);
  }

  function startParticles() {
    for (let i=0;i<DUST_N;i++){const p=mkDust();p.life=Math.random()*p.max;dust.push(p);}
    tickDust();
  }

  /* ══════════════════════════════════════════════════════════════════
     SOUND TOGGLE
     Controls both the motion-graphic video audio AND the ambient engine.
     Video audio only plays while the video is running.
     Ambient engine only plays after the video has frozen.
  ══════════════════════════════════════════════════════════════════ */
  let muted=true, fadeT=null;

  /** Ramp video element volume via setInterval (no Web Audio) */
  function fadeTo(target, ms) {
    clearInterval(fadeT);
    const steps=30, dt=ms/steps, start=video.volume, d=(target-start)/steps;
    let n=0;
    fadeT=setInterval(()=>{
      video.volume=Math.max(0,Math.min(1, start+d*(++n)));
      if(n>=steps) clearInterval(fadeT);
    },dt);
  }

  soundBtn.addEventListener('click', () => {
    muted = !muted;

    if (!muted) {
      /* ── User turns sound ON ── */
      iconMuted.style.display='none';
      iconUnmuted.style.display='block';

      if (!frozen) {
        // Video still playing — unmute video, no ambient yet
        video.muted=false; video.volume=0; fadeTo(1,700);
      } else {
        // Video already frozen — go straight to ambient
        // Resume audio context in case browser suspended it
        if (ambCtx && ambCtx.state === 'suspended') ambCtx.resume();
        ambientFadeIn(0);
      }

    } else {
      /* ── User turns sound OFF ── */
      iconMuted.style.display='block';
      iconUnmuted.style.display='none';

      // Fade out video audio
      fadeTo(0,500);
      setTimeout(()=>{ video.muted=true; },520);

      // Fade out ambient engine
      ambientFadeOut(600);
    }
  });

  // Auto-fade video audio in final 2 s of playback
  video.addEventListener('timeupdate', () => {
    if (!muted && video.duration) {
      const rem = video.duration - video.currentTime;
      if (rem < 2) video.volume = Math.max(0, rem/2);
    }
  });

})();
</script>
</body>
</html>
