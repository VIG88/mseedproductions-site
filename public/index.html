<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MustardSeed Productions — Planting Stories That Grow Into Worlds</title>
  <meta name="description" content="MustardSeed Productions — the children's storytelling and television production arm of Visionaires Media. Stories rooted in purpose, built to inspire the next generation." />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
/* ═══════════════════════════════════════════════════════════════
   RESET + ROOT TOKENS
═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:       #d4af37;
  --gold-lt:    #f0d060;
  --gold-dim:   rgba(212,175,55,0.60);
  --gold-ghost: rgba(212,175,55,0.10);
  --cream:      #fdf8ee;
  --black:      #000000;
  --deep:       #0a0800;
  --nav-h:      68px;
}

html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: 'Lora','Georgia',serif;
  background: var(--black);
  color: var(--cream);
  overflow: hidden;
  line-height: 1.7;
}
body.site-ready { overflow: hidden; }

/* ═══════════════════════════════════════════════════════════════
   LAYER STACK
   0   #stage / #hero-video  (freezes on last frame — no canvas swap)
   2   #bg-overlay
   3   #leaves-canvas
   4   #particles-canvas
   5   #vignette
  10   #site-chrome
  50   #vig-lockup / intro text / divider
  80   #sound-btn
  90   #loader
═══════════════════════════════════════════════════════════════ */

/* ─── FIXED CINEMATIC STAGE ──────────────────────────── */
#stage {
  position: fixed;
  inset: 0;
  background: var(--black);
  z-index: 0;
}

/* ─── VIDEO ──────────────────────────────────────────── */
#hero-video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  /* No opacity transition — video stays fully visible and freezes on last frame */
}

/* ─── FINAL-FRAME CANVAS — removed; video pauses on its own last frame ─── */

/* ─── CINEMATIC DIM OVERLAY ──────────────────────────── */
#bg-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.42) 0%,
    rgba(0,0,0,0.28) 45%,
    rgba(0,0,0,0.52) 100%
  );
  opacity: 0;
  transition: opacity 2.2s ease;
  pointer-events: none;
  z-index: 2;
}
#bg-overlay.visible { opacity: 1; }

/* ─── VIGNETTE ───────────────────────────────────────── */
#vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center,
    transparent 28%, rgba(0,0,0,0.72) 100%);
  opacity: 0;
  transition: opacity 1.5s ease;
  pointer-events: none;
  z-index: 5;
}
#vignette.visible { opacity: 1; }

/* ─── LEAVES CANVAS ──────────────────────────────────── */
#leaves-canvas {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 3;
  opacity: 0;
  transition: opacity 2.5s ease;
}
#leaves-canvas.visible { opacity: 1; }

/* ─── DUST PARTICLES ─────────────────────────────────── */
#particles-canvas {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 4;
  opacity: 0;
  transition: opacity 3.5s ease;
}
#particles-canvas.visible { opacity: 1; }

/* ─── GOLD DIVIDER (mid-screen, below logo) ──────────── */
#text-divider-wrap {
  position: fixed;
  top: 58%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s ease;
}
#text-divider-wrap.visible { opacity: 1; }
#text-divider {
  width: clamp(40px,8vw,72px);
  height: 1px;
  background: linear-gradient(to right,
    transparent, rgba(212,175,55,0.55) 30%,
    rgba(212,175,55,0.55) 70%, transparent);
}

/* ─── PATIENCE MESSAGE (bottom-center, above footer) ─── */
#intro-text {
  position: fixed;
  bottom: 78px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s ease;
  white-space: nowrap;
  text-align: center;
}
#intro-text.visible { opacity: 1; }
#intro-text.pulse   { animation: softPulse 7.5s ease-in-out infinite; }
@keyframes softPulse {
  0%,100% { opacity:1; filter:brightness(1); }
  50%     { opacity:0.88; filter:brightness(1.12); }
}
#intro-message {
  color: rgba(212,175,55,0.62);
  font-size: clamp(0.55rem,1.1vw,0.78rem);
  letter-spacing: 0.24em;
  text-align: center;
  font-style: italic;
  opacity: 0;
}
#intro-message.grow-in { animation: seedGrow 1.8s ease forwards; }
@keyframes seedGrow {
  0%   { opacity:0; transform:translateY(5px); }
  100% { opacity:0.62; transform:translateY(0); }
}

/* ─── VIG LOCKUP (intro sequence only) ───────────────── */
#vig-lockup {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2.4s cubic-bezier(0.4,0,0.6,1);
  white-space: nowrap;
}
#vig-lockup.visible { opacity: 1; pointer-events: all; }
#vig-lockup.fade-out {
  opacity: 0 !important;
  pointer-events: none !important;
  transition: opacity 1.2s ease !important;
}
#vig-lockup a {
  display: flex; align-items: center;
  text-decoration: none;
  transition: filter 0.25s ease;
}
#vig-lockup a:hover { filter: brightness(1.25); }
#vig-lockup img {
  width: clamp(32px,4vw,48px);
  height: auto;
  mix-blend-mode: screen;
  filter: brightness(0.9) saturate(1.0);
}
#vig-lockup span {
  font-family: 'Inter',sans-serif;
  font-size: clamp(0.48rem,0.8vw,0.62rem);
  letter-spacing: 0.30em;
  text-transform: uppercase;
  color: rgba(212,175,55,0.48);
}

/* ─── SOUND BUTTON ───────────────────────────────────── */
#sound-btn {
  position: fixed;
  bottom: 26px; right: 26px;
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 1.5px solid rgba(212,175,55,0.38);
  background: rgba(6,4,0,0.80);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--gold);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 80;
  outline: none;
  transition: border-color 0.3s, background 0.3s, transform 0.2s, box-shadow 0.3s;
}
#sound-btn:hover {
  border-color: rgba(212,175,55,0.80);
  background: rgba(16,10,0,0.95);
  transform: scale(1.1);
  box-shadow: 0 0 14px rgba(212,175,55,0.28);
}
#sound-btn svg { width:19px; height:19px; fill:var(--gold); }

/* ─── LOADER ─────────────────────────────────────────── */
#loader {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 90;
  background: #000;
  transition: opacity 0.8s ease;
}
#loader.hidden { opacity:0; pointer-events:none; }
.loader-ring {
  width:48px; height:48px;
  border: 2px solid rgba(212,175,55,0.14);
  border-top-color: rgba(212,175,55,0.85);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 18px;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loader p {
  color: rgba(212,175,55,0.55);
  font-size: 0.68rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-style: italic;
}

/* ═══════════════════════════════════════════════════════════════
   SITE CHROME — revealed after intro
═══════════════════════════════════════════════════════════════ */
#site-chrome {
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.6s ease;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
#site-chrome.visible {
  opacity: 1;
  pointer-events: all;
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION  — clean link-only nav, no dropdowns
═══════════════════════════════════════════════════════════════ */
#nav {
  position: relative;
  z-index: 20;
  height: var(--nav-h);
  padding: 0 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.68) 0%,
    rgba(0,0,0,0.0) 100%
  );
  pointer-events: all;
}

/* Brand */
.nav-brand {
  display: flex;
  flex-direction: column;
  gap: 2px;
  text-decoration: none;
  flex-shrink: 0;
}
.nav-brand-main {
  font-family: 'Cinzel',serif;
  font-size: 0.80rem;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-lt);
  line-height: 1;
}
.nav-brand-sub {
  font-family: 'Inter',sans-serif;
  font-size: 0.50rem;
  font-weight: 300;
  letter-spacing: 0.38em;
  text-transform: uppercase;
  color: rgba(212,175,55,0.45);
  line-height: 1;
}

/* Nav list */
.nav-items {
  display: flex;
  align-items: center;
  gap: 4px;
  list-style: none;
}

/* Each nav link */
.nav-link {
  display: flex;
  align-items: center;
  padding: 9px 16px;
  font-family: 'Inter',sans-serif;
  font-size: 0.68rem;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(240,220,160,0.65);
  text-decoration: none;
  white-space: nowrap;
  transition: color 0.25s ease, border-bottom-color 0.25s ease;
  border-bottom: 1px solid transparent;
  position: relative;
}
.nav-link::after {
  content: '';
  position: absolute;
  bottom: 4px; left: 16px; right: 16px;
  height: 1px;
  background: var(--gold-lt);
  transform: scaleX(0);
  transform-origin: center;
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
}
.nav-link:hover { color: var(--gold-lt); }
.nav-link:hover::after { transform: scaleX(1); }

/* ═══════════════════════════════════════════════════════════════
   FOOTER CHROME
   LEFT  — VIG emblem (linked) + "A VIG Company" label
   CENTER — © 2026 copyright
   RIGHT  — spacer (sound toggle btn is position:fixed)
═══════════════════════════════════════════════════════════════ */
#footer-chrome {
  position: relative;
  z-index: 15;
  padding: 0 52px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.76) 0%,
    rgba(0,0,0,0.0) 100%
  );
  pointer-events: all;
  flex-shrink: 0;
}

/* LEFT — VIG lockup */
.footer-vig-lockup {
  display: flex;
  align-items: center;
  gap: 9px;
  animation: vigGlowPulse 8s ease-in-out infinite;
}
@keyframes vigGlowPulse {
  0%, 78%, 100% { filter: brightness(1)    drop-shadow(0 0  0px rgba(212,175,55,0.00)); }
  86%           { filter: brightness(1.20) drop-shadow(0 0  8px rgba(212,175,55,0.26)); }
}
.footer-vig-link {
  display: flex;
  align-items: center;
  text-decoration: none;
  cursor: pointer;
  transition: filter 0.30s ease, transform 0.30s ease;
  flex-shrink: 0;
}
.footer-vig-link:hover {
  filter: brightness(1.45) drop-shadow(0 0 10px rgba(212,175,55,0.40));
  transform: scale(1.06);
}
.footer-vig-link img {
  width: clamp(22px, 2.8vw, 32px);
  height: auto;
  mix-blend-mode: screen;
  opacity: 0.55;
  display: block;
}
.footer-vig-label {
  font-family: 'Inter', sans-serif;
  font-size: clamp(0.46rem, 0.72vw, 0.58rem);
  letter-spacing: 0.30em;
  text-transform: uppercase;
  color: rgba(212,175,55,0.42);
  white-space: nowrap;
  pointer-events: none;
}

/* CENTER — copyright */
.footer-copy {
  font-family: 'Inter',sans-serif;
  font-size: 0.52rem;
  letter-spacing: 0.14em;
  color: rgba(212,175,55,0.18);
  text-align: center;
  flex-shrink: 1;
  padding: 0 12px;
}

/* RIGHT spacer */
.footer-spacer {
  min-width: 80px;
  flex-shrink: 0;
}

/* Contact Us footer link */
.footer-contact-link {
  font-family: 'Inter',sans-serif;
  font-size: clamp(0.46rem,0.72vw,0.58rem);
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: rgba(212,175,55,0.38);
  text-decoration: none;
  white-space: nowrap;
  transition: color 0.28s ease, text-shadow 0.28s ease;
  flex-shrink: 0;
}
.footer-contact-link:hover {
  color: rgba(240,208,96,0.82);
  text-shadow: 0 0 14px rgba(212,175,55,0.30);
}

/* ═══════════════════════════════════════════════════════════════
   MOBILE
═══════════════════════════════════════════════════════════════ */
@media (max-width: 900px) {
  #nav { padding: 0 24px; }
  .nav-items { gap: 0; }
  .nav-link { padding: 8px 10px; font-size: 0.62rem; }
  #footer-chrome { padding: 0 24px; height: 60px; }
  .footer-copy { font-size: 0.44rem; letter-spacing: 0.10em; padding: 0 8px; }
  .footer-spacer { min-width: 0; display: none; }
  .footer-contact-link { font-size: 0.44rem; letter-spacing: 0.18em; }
}
@media (max-width: 600px) {
  .nav-brand-main { font-size: 0.68rem; }
  .nav-link { padding: 8px 8px; font-size: 0.58rem; letter-spacing: 0.12em; }
}
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     FIXED CINEMATIC STAGE
════════════════════════════════════════════ -->
<div id="stage" aria-hidden="true">
  <video id="hero-video"
    autoplay muted playsinline preload="auto"
    disablePictureInPicture webkit-playsinline>
    <source
      src="https://pub-00891786ee42488cb8a715a9bc019602.r2.dev/mustardseed-motion.mp4"
      type="video/mp4" />
  </video>
</div>

<!-- Fixed overlays -->
<div id="bg-overlay"          aria-hidden="true"></div>
<div id="vignette"            aria-hidden="true"></div>
<canvas id="leaves-canvas"    aria-hidden="true"></canvas>
<canvas id="particles-canvas" aria-hidden="true"></canvas>

<!-- ── GOLD DIVIDER (mid-screen, below logo) ── -->
<div id="text-divider-wrap" aria-hidden="true">
  <div id="text-divider"></div>
</div>

<!-- ── PATIENCE MESSAGE (bottom-center, above footer) ── -->
<div id="intro-text" aria-hidden="true">
  <div id="intro-message">We are currently planting seeds&hellip; thank you for your patience.</div>
</div>

<!-- ── VIG LOCKUP (shown during intro, then fades) ── -->
<div id="vig-lockup">
  <a href="https://www.vigholdings.com" target="_blank" rel="noopener noreferrer"
     aria-label="VIG Holdings — opens in new tab">
    <img src="/static/vig-logo-transparent.png" alt="VIG" draggable="false" />
  </a>
  <span>A VIG Company</span>
</div>

<!-- ── LOADER ── -->
<div id="loader" aria-label="Loading">
  <div class="loader-ring"></div>
  <p>Loading&hellip;</p>
</div>

<!-- ── SOUND BUTTON ── -->
<button id="sound-btn" aria-label="Toggle sound">
  <svg id="icon-muted" viewBox="0 0 24 24">
    <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19L19 20.27 20.27 19l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>
  </svg>
  <svg id="icon-unmuted" viewBox="0 0 24 24" style="display:none">

  </svg>
</button>

<!-- ═══════════════════════════════════════════════
     SITE CHROME — nav + footer, fades in after intro
════════════════════════════════════════════════ -->

  <!-- ── TOP NAVIGATION ── -->
  <nav id="nav" aria-label="Main navigation">

    <a href="/" class="nav-brand" aria-label="MustardSeed Productions home">
      <span class="nav-brand-main">MustardSeed Productions</span>

    <!-- RIGHT: Contact Us link -->
    <a href="/contact" class="footer-contact-link">Contact Us</a>

  </footer>

</div><!-- #site-chrome -->

<script>
(function () {
  "use strict";

  /* ─── DOM REFS ──────────────────────────────────────── */
  const video       = document.getElementById('hero-video');
  const bgOverlay   = document.getElementById('bg-overlay');
  const vignette    = document.getElementById('vignette');
  const leavesC     = document.getElementById('leaves-canvas');
  const particlesC  = document.getElementById('particles-canvas');
  const introText   = document.getElementById('intro-text');
  const introMsg    = document.getElementById('intro-message');
  const vigLockup   = document.getElementById('vig-lockup');
  const dividerWrap = document.getElementById('text-divider-wrap');
  const siteChrome  = document.getElementById('site-chrome');
  const soundBtn    = document.getElementById('sound-btn');
  const iconMuted   = document.getElementById('icon-muted');
  const iconUnmuted = document.getElementById('icon-unmuted');
  const loader      = document.getElementById('loader');

  const lCtx = leavesC.getContext('2d');
  const pCtx = particlesC.getContext('2d');

  let frozen        = false;
  let leavesStarted = false;
  let siteRevealed  = false;

  /* ─── RESIZE ────────────────────────────────────────── */
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    leavesC.width  = particlesC.width  = w;
    leavesC.height = particlesC.height = h;
  }
  resize();
  window.addEventListener('resize', resize, { passive: true });

  /* ─── LOADER ────────────────────────────────────────── */
  function hideLoader() {
    loader.classList.add('hidden');
    setTimeout(() => { loader.style.display = 'none'; }, 900);
  }
  video.addEventListener('canplaythrough', hideLoader, { once: true });
  video.addEventListener('playing',        hideLoader, { once: true });
  setTimeout(hideLoader, 3000);

  /* ─── REVEAL SITE ───────────────────────────────────── */
  function revealSite() {
    if (siteRevealed) return;
    siteRevealed = true;

    bgOverlay.classList.add('visible');
    siteChrome.classList.add('visible');
    document.body.classList.add('site-ready');

    // Fade out intro-only elements
    setTimeout(() => {
      introText.style.transition = 'opacity 1.4s ease';
      introText.style.opacity    = '0';
      if (dividerWrap) {
        dividerWrap.style.transition = 'opacity 1.4s ease';
        dividerWrap.style.opacity    = '0';
      }
      vigLockup.classList.add('fade-out');
    }, 700);
  }

  /* ─── FREEZE FINAL FRAME ────────────────────────────── */
  // Simply pause the video — it stays mounted and visible at full opacity,
  // holding its own last frame. No canvas draw, no image swap, no crossfade.
  function freezeFrame() {
    if (frozen) return;
    frozen = true;

    // Pause immediately — video element holds its last frame naturally
    video.pause();

    // Small rAF delay to ensure the browser has rendered the paused frame
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {

        setTimeout(() => vignette.classList.add('visible'), 200);

        setTimeout(() => {
          leavesC.classList.add('visible');
          particlesC.classList.add('visible');
          startLeaves();
          startParticles();
          buildAmbient();
          if (!muted) ambientFadeIn(1500);
        }, 800);

        setTimeout(() => {
          if (dividerWrap) dividerWrap.classList.add('visible');
          introText.classList.add('visible');
          setTimeout(() => introMsg.classList.add('grow-in'), 800);
          setTimeout(() => introText.classList.add('pulse'), 2000);
        }, 1800);

        setTimeout(() => vigLockup.classList.add('visible'), 3200);

        // Site chrome reveals at 5s
        setTimeout(() => revealSite(), 5000);

      });
    });
  }

  video.addEventListener('ended', freezeFrame);
  video.addEventListener('timeupdate', () => {
    if (video.duration && video.currentTime >= video.duration - 0.15) freezeFrame();
  });
  video.play().catch(() => {
    ['click','touchstart','keydown'].forEach(ev =>
      document.addEventListener(ev, () => video.play(), { once: true })
    );
  });

  /* ═══════════════════════════════════════════════════════
     GOLDEN LEAVES
  ═══════════════════════════════════════════════════════ */
  const LEAF_N = 22;
  const leaves = [];

  function drawLeaf(c, sz, shimmer) {
    const g = c.createRadialGradient(0,-sz*.25,sz*.04,0,0,sz*1.1);
    g.addColorStop(0,   'rgba(255,232,110,.95)');
    g.addColorStop(.35, 'rgba(212,175, 55,.88)');
    g.addColorStop(.75, 'rgba(180,140, 28,.78)');
    g.addColorStop(1,   'rgba(130, 95, 15,.55)');
    c.beginPath();
    c.moveTo(0,-sz);
    c.bezierCurveTo( sz*.65,-sz*.45, sz*.72,sz*.28, 0, sz);
    c.bezierCurveTo(-sz*.72, sz*.28,-sz*.65,-sz*.45, 0,-sz);
    c.closePath();
    c.fillStyle = g; c.fill();
    c.beginPath();
    c.moveTo(0,-sz*.82);
    c.quadraticCurveTo(sz*.07,0,0,sz*.82);
    c.strokeStyle='rgba(255,210,70,.35)';
    c.lineWidth=Math.max(.5,sz*.055); c.stroke();
    if (shimmer) {
      c.beginPath();
      c.moveTo(sz*.05,-sz*.55);
      c.bezierCurveTo(sz*.38,-sz*.18,sz*.32,sz*.12,sz*.05,sz*.45);
      c.strokeStyle='rgba(255,248,190,.5)';
      c.lineWidth=Math.max(.4,sz*.04); c.stroke();
    }
  }
  function mkLeaf(stagger) {
    const W=leavesC.width, H=leavesC.height;
    return {
      x:  Math.random()*W*1.3-W*.15,
      y:  stagger?-Math.random()*H*1.4:-(20+Math.random()*80),
      sz: 6+Math.random()*10,
      vx: (Math.random()-.5)*.5,
      vy: .45+Math.random()*.85,
      rot:  Math.random()*Math.PI*2,
      rotV: (Math.random()-.5)*.022,
      wob:  Math.random()*Math.PI*2,
      wobS: .009+Math.random()*.013,
      wobA: .35+Math.random()*.6,
      shi:  Math.random()>.45,
      alp:  .50+Math.random()*.42,
      gPh:  Math.random()*Math.PI*2,
      gSpd: .018+Math.random()*.022,
    };
  }
  function tickLeaves() {
    const W=leavesC.width,H=leavesC.height;
    lCtx.clearRect(0,0,W,H);
    leaves.forEach(l=>{
      l.wob+=l.wobS; l.rot+=l.rotV;
      l.x+=l.vx+Math.sin(l.wob)*l.wobA; l.y+=l.vy; l.gPh+=l.gSpd;
      if(l.y>H+30) Object.assign(l,mkLeaf(false));
      const a=l.shi?l.alp*(.72+.28*Math.sin(l.gPh)):l.alp;
      lCtx.save();
      lCtx.translate(l.x,l.y); lCtx.rotate(l.rot); lCtx.globalAlpha=a;
      if(l.shi&&Math.sin(l.gPh)>.3){lCtx.shadowColor='rgba(255,210,60,.65)';lCtx.shadowBlur=l.sz*1.6;}
      drawLeaf(lCtx,l.sz,l.shi);
      lCtx.shadowBlur=0; lCtx.restore();
    });
    requestAnimationFrame(tickLeaves);
  }
  function startLeaves() {
    if(leavesStarted) return; leavesStarted=true;
    for(let i=0;i<LEAF_N;i++) leaves.push(mkLeaf(true));
    tickLeaves();
  }

  /* ═══════════════════════════════════════════════════════
     AMBIENT DUST PARTICLES
  ═══════════════════════════════════════════════════════ */
  const DUST_N=40; const dust=[];
  function mkDust(){
    return{
      x:Math.random()*particlesC.width,
      y:Math.random()*particlesC.height,
      r:.7+Math.random()*1.8,
      vx:(Math.random()-.5)*.18,
      vy:-(0.07+Math.random()*.15),
      a:.07+Math.random()*.2,
      life:0,max:220+Math.random()*280,
    };
  }
  function tickDust(){
    const W=particlesC.width,H=particlesC.height;
    pCtx.clearRect(0,0,W,H);
    dust.forEach(p=>{
      p.life++;p.x+=p.vx;p.y+=p.vy;
      if(p.life>p.max||p.y<-4||p.x<-4||p.x>W+4){Object.assign(p,mkDust());p.life=0;return;}
      const t=p.life/p.max,f=t<.15?t/.15:t>.78?(1-t)/.22:1;
      pCtx.beginPath();pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
      pCtx.fillStyle=`rgba(212,175,55,${p.a*f})`;pCtx.fill();
    });
    requestAnimationFrame(tickDust);
  }
  function startParticles(){
    for(let i=0;i<DUST_N;i++){const p=mkDust();p.life=Math.random()*p.max;dust.push(p);}
    tickDust();
  }

  /* ═══════════════════════════════════════════════════════
     AMBIENT SOUND ENGINE
  ═══════════════════════════════════════════════════════ */
  let ambCtx=null,masterGain=null,ambientReady=false,ambientActive=false;
  let gustTimer=null,rustleTimer=null;
  const MASTER_VOL=0.38;
  let windSource=null,panner=null,panPhase=0;

  function makeNoise(ac,sec){
    const l=ac.sampleRate*sec,b=ac.createBuffer(1,l,ac.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<l;i++)d[i]=Math.random()*2-1;return b;
  }
  function rampGain(g,target,ms){
    const ac=g.context,now=ac.currentTime;
    g.gain.cancelScheduledValues(now);g.gain.setValueAtTime(g.gain.value,now);
    g.gain.linearRampToValueAtTime(target,now+ms/1000);
  }
  function buildWindBed(ac){
    windSource=ac.createBufferSource();windSource.buffer=makeNoise(ac,4);windSource.loop=true;
    const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=320;bp.Q.value=.55;
    const hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=90;hp.Q.value=.5;
    const wg=ac.createGain();wg.gain.value=.18;
    const lfo=ac.createOscillator();lfo.type='sine';lfo.frequency.value=.06;
    const lg=ac.createGain();lg.gain.value=.065;
    panner=ac.createStereoPanner?ac.createStereoPanner():ac.createPanner();
    if(panner.pan)panner.pan.value=0;
    windSource.connect(bp);bp.connect(hp);hp.connect(wg);wg.connect(panner);panner.connect(masterGain);
    lfo.connect(lg);lg.connect(wg.gain);lfo.start();windSource.start();
  }
  function fireGust(ac){
    if(!ambientActive)return;
    const src=ac.createBufferSource();src.buffer=makeNoise(ac,2.5);
    const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=550+Math.random()*200;bp.Q.value=.7;
    const pan=ac.createStereoPanner?ac.createStereoPanner():null;
    const env=ac.createGain();env.gain.value=0;
    src.connect(bp);bp.connect(env);
    if(pan){pan.pan.value=(Math.random()-.5)*.5;env.connect(pan);pan.connect(masterGain);}else{env.connect(masterGain);}
    const now=ac.currentTime,peak=.10+Math.random()*.08,dur=1.6+Math.random()*.8;
    env.gain.setValueAtTime(0,now);env.gain.linearRampToValueAtTime(peak,now+dur*.35);env.gain.linearRampToValueAtTime(0,now+dur);
    src.start(now);src.stop(now+dur+.05);
    gustTimer=setTimeout(()=>fireGust(ac),6000+Math.random()*4000);
  }
  function fireRustle(ac){
    if(!ambientActive)return;
    const dur=.35+Math.random()*.3,src=ac.createBufferSource();src.buffer=makeNoise(ac,dur+.1);
    const hp=ac.createBiquadFilter();hp.type='highpass';hp.frequency.value=1800+Math.random()*1700;hp.Q.value=.4;
    const bp2=ac.createBiquadFilter();bp2.type='bandpass';bp2.frequency.value=3000+Math.random()*1500;bp2.Q.value=1.2;
    const pan=ac.createStereoPanner?ac.createStereoPanner():null;
    const env=ac.createGain();env.gain.value=0;
    src.connect(hp);hp.connect(bp2);bp2.connect(env);
    if(pan){pan.pan.value=(Math.random()-.5)*.8;env.connect(pan);pan.connect(masterGain);}else{env.connect(masterGain);}
    const now=ac.currentTime,peak=.05+Math.random()*.04;
    env.gain.setValueAtTime(0,now);env.gain.linearRampToValueAtTime(peak,now+.02);env.gain.exponentialRampToValueAtTime(.0001,now+dur);
    src.start(now);src.stop(now+dur+.05);
    rustleTimer=setTimeout(()=>fireRustle(ac),3000+Math.random()*4000);
  }
  function buildAirTexture(ac){
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.value=42;g.gain.value=.022;
    o.connect(g);g.connect(masterGain);o.start();
  }
  function tickPanner(){
    if(!ambientActive||!panner||!panner.pan)return;
    panPhase+=.0035;
    panner.pan.setTargetAtTime(Math.sin(panPhase)*.4,ambCtx.currentTime,1.5);
    setTimeout(tickPanner,300);
  }
  function buildAmbient(){
    if(ambientReady)return;ambientReady=true;
    ambCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=ambCtx.createGain();masterGain.gain.value=0;masterGain.connect(ambCtx.destination);
    buildWindBed(ambCtx);buildAirTexture(ambCtx);
  }
  function ambientFadeIn(delayMs){
    if(!ambientReady||ambientActive)return;ambientActive=true;
    setTimeout(()=>{
      if(!ambientActive)return;
      if(ambCtx.state==='suspended')ambCtx.resume();
      rampGain(masterGain,MASTER_VOL,2500);
      setTimeout(()=>{
        if(!ambientActive)return;
        gustTimer=setTimeout(()=>fireGust(ambCtx),1200+Math.random()*2000);
        rustleTimer=setTimeout(()=>fireRustle(ambCtx),800+Math.random()*1500);
        tickPanner();
      },2600);
    },delayMs);
  }
  function ambientFadeOut(ms){
    if(!ambientReady||!ambientActive)return;ambientActive=false;
    clearTimeout(gustTimer);clearTimeout(rustleTimer);rampGain(masterGain,0,ms);
  }
  function resumeCtx(){if(ambCtx&&ambCtx.state==='suspended')ambCtx.resume();}
  document.addEventListener('click',     resumeCtx,{passive:true});
  document.addEventListener('touchstart',resumeCtx,{passive:true});

  /* ═══════════════════════════════════════════════════════
     SOUND TOGGLE
  ═══════════════════════════════════════════════════════ */
  let muted=true,fadeT=null;
  function fadeTo(target,ms){
    clearInterval(fadeT);
    const steps=30,dt=ms/steps,start=video.volume,d=(target-start)/steps;let n=0;
    fadeT=setInterval(()=>{video.volume=Math.max(0,Math.min(1,start+d*(++n)));if(n>=steps)clearInterval(fadeT);},dt);
  }
  soundBtn.addEventListener('click',()=>{
    muted=!muted;
    if(!muted){
      iconMuted.style.display='none';iconUnmuted.style.display='block';
      if(!frozen){video.muted=false;video.volume=0;fadeTo(1,700);}
      else{if(ambCtx&&ambCtx.state==='suspended')ambCtx.resume();ambientFadeIn(0);}
    }else{
      iconMuted.style.display='block';iconUnmuted.style.display='none';
      fadeTo(0,500);setTimeout(()=>{video.muted=true;},520);
      ambientFadeOut(600);
    }
  });
  video.addEventListener('timeupdate',()=>{
    if(!muted&&video.duration){const rem=video.duration-video.currentTime;if(rem<2)video.volume=Math.max(0,rem/2);}
  });

})();
</script>
