<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MustardSeed Productions</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <style>
    /* ── RESET ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Georgia', 'Palatino Linotype', serif;
    }

    /* ── STAGE ── */
    #stage {
      position: fixed;
      inset: 0;
      background: #000;
    }

    /* ── VIDEO ── */
    #hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.6s ease;
    }

    /* ── FINAL-FRAME CANVAS ── */
    #final-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.7s ease;
      pointer-events: none;
    }
    #final-canvas.visible { opacity: 1; }

    /* ── VIGNETTE ── */
    #vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 35%, rgba(0,0,0,0.55) 100%);
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
      z-index: 2;
    }
    #vignette.visible { opacity: 1; }

    /* ── LEAVES ── */
    #leaves-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 2.5s ease;
    }
    #leaves-canvas.visible { opacity: 1; }

    /* ── DUST PARTICLES ── */
    #particles-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
      opacity: 0;
      transition: opacity 3.5s ease;
    }
    #particles-canvas.visible { opacity: 1; }

    /* ── TEXT OVERLAY ── */
    #message {
      position: absolute;
      bottom: 11%;
      left: 50%;
      transform: translateX(-50%);
      color: #d4af37;
      font-size: clamp(0.72rem, 1.75vw, 1.12rem);
      letter-spacing: 0.18em;
      text-align: center;
      white-space: nowrap;
      max-width: 90vw;
      opacity: 0;
      z-index: 10;
      font-style: italic;
      font-weight: 400;
      text-shadow:
        0 0 10px rgba(212,175,55,0.9),
        0 0 26px rgba(212,175,55,0.5),
        0 0 52px rgba(212,175,55,0.22);
      transition: opacity 2s ease;
      pointer-events: none;
    }
    #message.visible { opacity: 1; }
    #message.pulse  { animation: goldenPulse 7.5s ease-in-out infinite; }

    @keyframes goldenPulse {
      0%,100% {
        text-shadow:
          0 0 10px rgba(212,175,55,0.9),
          0 0 26px rgba(212,175,55,0.5),
          0 0 52px rgba(212,175,55,0.22);
        opacity: 1;
      }
      50% {
        text-shadow:
          0 0 18px rgba(255,215,0,1),
          0 0 40px rgba(212,175,55,0.88),
          0 0 78px rgba(212,175,55,0.55),
          0 0 120px rgba(212,175,55,0.22);
        opacity: 0.9;
      }
    }

    /* ── SOUND TOGGLE ── */
    #sound-btn {
      position: fixed;
      bottom: 26px;
      right: 26px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1.5px solid rgba(212,175,55,0.4);
      background: rgba(8,12,18,0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #d4af37;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      outline: none;
      transition: border-color 0.3s, background 0.3s, transform 0.2s, box-shadow 0.3s;
    }
    #sound-btn:hover {
      border-color: rgba(212,175,55,0.85);
      background: rgba(18,22,30,0.94);
      transform: scale(1.1);
      box-shadow: 0 0 14px rgba(212,175,55,0.3);
    }
    #sound-btn svg { width: 19px; height: 19px; fill: #d4af37; }

    /* ── LOADING INDICATOR ── */
    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: #000;
      transition: opacity 0.8s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(212,175,55,0.15);
      border-top-color: rgba(212,175,55,0.85);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p {
      color: rgba(212,175,55,0.6);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-style: italic;
    }
  </style>
</head>
<body>

<div id="stage">

  <!-- Loading screen while video buffers -->
  <div id="loader">
    <div class="loader-ring"></div>
    <p>Loading&hellip;</p>
  </div>

  <video id="hero-video"
    autoplay
    muted
    playsinline
    preload="auto"
    disablePictureInPicture
    webkit-playsinline
    crossorigin="anonymous"
  >
    <!--
      PRIMARY SOURCE: Cloudflare R2 — production CDN asset
      Bucket: mustardseed-assets  |  Public URL enabled
    -->
    <source
      src="https://pub-00891786ee42488cb8a715a9bc019602.r2.dev/mustardseed-motion.mp4"
      type="video/mp4"
    />
  </video>

  <canvas id="final-canvas"></canvas>
  <div id="vignette"></div>
  <canvas id="leaves-canvas"></canvas>
  <canvas id="particles-canvas"></canvas>

  <div id="message">We are currently planting seeds&hellip; thank you for your patience.</div>

</div>

<!-- Sound Toggle -->
<button id="sound-btn" aria-label="Toggle sound">
  <svg id="icon-muted" viewBox="0 0 24 24">
    <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 19L19 20.27 20.27 19l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>
  </svg>
  <svg id="icon-unmuted" viewBox="0 0 24 24" style="display:none">
    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/>
  </svg>
</button>

<script>
(function () {
  "use strict";

  /* ─── DOM ─── */
  const video        = document.getElementById('hero-video');
  const finalCanvas  = document.getElementById('final-canvas');
  const vignette     = document.getElementById('vignette');
  const leavesCanvas = document.getElementById('leaves-canvas');
  const particlesC   = document.getElementById('particles-canvas');
  const message      = document.getElementById('message');
  const soundBtn     = document.getElementById('sound-btn');
  const iconMuted    = document.getElementById('icon-muted');
  const iconUnmuted  = document.getElementById('icon-unmuted');
  const loader       = document.getElementById('loader');

  const ctx  = finalCanvas.getContext('2d');
  const lCtx = leavesCanvas.getContext('2d');
  const pCtx = particlesC.getContext('2d');

  let frozen        = false;
  let leavesStarted = false;

  /* ─── CANVAS RESIZE ─── */
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    finalCanvas.width  = leavesCanvas.width  = particlesC.width  = w;
    finalCanvas.height = leavesCanvas.height = particlesC.height = h;
  }
  resize();
  window.addEventListener('resize', () => {
    resize();
    if (frozen) {
      try { ctx.drawImage(video, 0, 0, finalCanvas.width, finalCanvas.height); } catch(e){}
    }
  });

  /* ─── LOADER: hide once video can play ─── */
  function hideLoader() {
    loader.classList.add('hidden');
    setTimeout(() => { loader.style.display = 'none'; }, 900);
  }
  video.addEventListener('canplaythrough', hideLoader, { once: true });
  video.addEventListener('playing', hideLoader, { once: true });
  // Fallback: hide after 3s regardless
  setTimeout(hideLoader, 3000);

  /* ─── FREEZE FINAL FRAME ─── */
  function freezeFrame() {
    if (frozen) return;
    frozen = true;

    resize();
    try { ctx.drawImage(video, 0, 0, finalCanvas.width, finalCanvas.height); } catch(e) {}

    // Cross-fade: canvas over video
    finalCanvas.classList.add('visible');
    setTimeout(() => {
      video.pause();
      video.style.opacity = '0';
    }, 550);

    // Vignette
    setTimeout(() => vignette.classList.add('visible'), 400);

    // Text: fade in at 1.8s, pulse starts 2s later
    setTimeout(() => {
      message.classList.add('visible');
      setTimeout(() => message.classList.add('pulse'), 2000);
    }, 1800);

    // Leaves + particles at 1s
    setTimeout(() => {
      leavesCanvas.classList.add('visible');
      particlesC.classList.add('visible');
      startLeaves();
      startParticles();
    }, 1000);
  }

  video.addEventListener('ended', freezeFrame);
  video.addEventListener('timeupdate', () => {
    if (video.duration && video.currentTime >= video.duration - 0.15) freezeFrame();
  });

  /* Autoplay fallback */
  video.play().catch(() => {
    ['click','touchstart','keydown'].forEach(e =>
      document.addEventListener(e, () => video.play(), { once: true })
    );
  });

  /* ══════════════════════════════════════
     GOLDEN LEAVES
  ══════════════════════════════════════ */
  const LEAF_N = 22;
  const leaves = [];

  function drawLeaf(c, sz, shimmer) {
    const g = c.createRadialGradient(0, -sz*0.25, sz*0.04, 0, 0, sz*1.1);
    g.addColorStop(0,    'rgba(255,232,110,0.95)');
    g.addColorStop(0.35, 'rgba(212,175, 55,0.88)');
    g.addColorStop(0.75, 'rgba(180,140, 28,0.78)');
    g.addColorStop(1,    'rgba(130, 95, 15,0.55)');

    c.beginPath();
    c.moveTo(0, -sz);
    c.bezierCurveTo( sz*0.65,-sz*0.45,  sz*0.72, sz*0.28, 0,  sz);
    c.bezierCurveTo(-sz*0.72, sz*0.28, -sz*0.65,-sz*0.45, 0, -sz);
    c.closePath();
    c.fillStyle = g;
    c.fill();

    // midrib
    c.beginPath();
    c.moveTo(0, -sz*0.82);
    c.quadraticCurveTo(sz*0.07, 0, 0, sz*0.82);
    c.strokeStyle = 'rgba(255,210,70,0.35)';
    c.lineWidth = Math.max(0.5, sz*0.055);
    c.stroke();

    if (shimmer) {
      c.beginPath();
      c.moveTo(sz*0.05, -sz*0.55);
      c.bezierCurveTo(sz*0.38,-sz*0.18, sz*0.32,sz*0.12, sz*0.05, sz*0.45);
      c.strokeStyle = 'rgba(255,248,190,0.5)';
      c.lineWidth = Math.max(0.4, sz*0.04);
      c.stroke();
    }
  }

  function mkLeaf(stagger) {
    const W = leavesCanvas.width, H = leavesCanvas.height;
    return {
      x:  Math.random() * W * 1.3 - W * 0.15,
      y:  stagger ? -Math.random() * H * 1.4 : -(20 + Math.random()*80),
      sz: 6 + Math.random()*10,
      vx: (Math.random()-0.5)*0.5,
      vy: 0.45 + Math.random()*0.85,
      rot:  Math.random()*Math.PI*2,
      rotV: (Math.random()-0.5)*0.022,
      wob:  Math.random()*Math.PI*2,
      wobS: 0.009 + Math.random()*0.013,
      wobA: 0.35 + Math.random()*0.6,
      shi:  Math.random() > 0.45,
      alp:  0.50 + Math.random()*0.42,
      gPh:  Math.random()*Math.PI*2,
      gSpd: 0.018 + Math.random()*0.022,
    };
  }

  function tickLeaves() {
    const W = leavesCanvas.width, H = leavesCanvas.height;
    lCtx.clearRect(0,0,W,H);
    leaves.forEach(l => {
      l.wob += l.wobS;
      l.rot += l.rotV;
      l.x   += l.vx + Math.sin(l.wob)*l.wobA;
      l.y   += l.vy;
      l.gPh += l.gSpd;
      if (l.y > H+30) Object.assign(l, mkLeaf(false));
      const a = l.shi ? l.alp*(0.72+0.28*Math.sin(l.gPh)) : l.alp;
      lCtx.save();
      lCtx.translate(l.x, l.y);
      lCtx.rotate(l.rot);
      lCtx.globalAlpha = a;
      if (l.shi && Math.sin(l.gPh)>0.3) {
        lCtx.shadowColor='rgba(255,210,60,0.65)';
        lCtx.shadowBlur = l.sz*1.6;
      }
      drawLeaf(lCtx, l.sz, l.shi);
      lCtx.shadowBlur=0;
      lCtx.restore();
    });
    requestAnimationFrame(tickLeaves);
  }

  function startLeaves() {
    if (leavesStarted) return;
    leavesStarted = true;
    for (let i=0; i<LEAF_N; i++) leaves.push(mkLeaf(true));
    tickLeaves();
  }

  /* ══════════════════════════════════════
     AMBIENT DUST PARTICLES
  ══════════════════════════════════════ */
  const DUST_N = 40;
  const dust   = [];

  function mkDust() {
    return {
      x: Math.random()*particlesC.width,
      y: Math.random()*particlesC.height,
      r: 0.7 + Math.random()*1.8,
      vx:(Math.random()-0.5)*0.18,
      vy:-(0.07+Math.random()*0.15),
      a: 0.07+Math.random()*0.2,
      life:0, max:220+Math.random()*280,
    };
  }

  function tickDust() {
    const W=particlesC.width, H=particlesC.height;
    pCtx.clearRect(0,0,W,H);
    dust.forEach(p => {
      p.life++; p.x+=p.vx; p.y+=p.vy;
      if (p.life>p.max||p.y<-4||p.x<-4||p.x>W+4) {
        Object.assign(p,mkDust()); p.life=0; return;
      }
      const t=p.life/p.max;
      const f=t<0.15?t/0.15:t>0.78?(1-t)/0.22:1;
      pCtx.beginPath();
      pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
      pCtx.fillStyle=`rgba(212,175,55,${p.a*f})`;
      pCtx.fill();
    });
    requestAnimationFrame(tickDust);
  }

  function startParticles() {
    for (let i=0;i<DUST_N;i++){const p=mkDust();p.life=Math.random()*p.max;dust.push(p);}
    tickDust();
  }

  /* ══════════════════════════════════════
     SOUND TOGGLE
  ══════════════════════════════════════ */
  let muted=true, fadeT=null;

  function fadeTo(target, ms) {
    clearInterval(fadeT);
    const steps=30, dt=ms/steps, start=video.volume, d=(target-start)/steps;
    let n=0;
    fadeT=setInterval(()=>{
      video.volume=Math.max(0,Math.min(1, start+d*(++n)));
      if(n>=steps) clearInterval(fadeT);
    },dt);
  }

  soundBtn.addEventListener('click', () => {
    muted = !muted;
    if (!muted) {
      video.muted=false; video.volume=0; fadeTo(1,700);
      iconMuted.style.display='none'; iconUnmuted.style.display='block';
    } else {
      fadeTo(0,500);
      setTimeout(()=>{video.muted=true;},520);
      iconMuted.style.display='block'; iconUnmuted.style.display='none';
    }
  });

  // Auto-fade audio in last 2s
  video.addEventListener('timeupdate', () => {
    if (!muted && video.duration) {
      const rem = video.duration - video.currentTime;
      if (rem < 2) video.volume = Math.max(0, rem/2);
    }
  });

})();
</script>
</body>
</html>
